name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  matrix:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.load.outputs.versions }}
    steps:
      - uses: actions/checkout@v4
      - id: load
        run: echo "versions=$(cat .github/flb-versions.json)" >> $GITHUB_OUTPUT

  build:
    needs: matrix
    strategy:
      fail-fast: false
      matrix:
        flb_version: ${{ fromJSON(needs.matrix.outputs.versions) }}
    uses: ./.github/workflows/reusable-build.yml
    with:
      flb_version: ${{ matrix.flb_version }}
      artifact_prefix: flb-input-dnstap

  static-analysis:
    name: Static analysis (cppcheck)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout plugin source
        uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck \
            --enable=warning,performance,portability \
            --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            --suppress=*:in_dnstap/dnstap.pb-c.h \
            --inline-suppr \
            -i in_dnstap/dnstap.pb-c.c \
            in_dnstap/
