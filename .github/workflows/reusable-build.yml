name: Reusable Build

on:
  workflow_call:
    inputs:
      flb_version:
        required: true
        type: string
      artifact_prefix:
        required: true
        type: string
        description: "Prefix for the uploaded artifact name"
      prepare_release:
        required: false
        type: boolean
        default: false
        description: "If true, rename .so for release distribution"

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04
    env:
      DEBIAN_FRONTEND: noninteractive
    steps:
      - name: Checkout plugin source
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            software-properties-common \
            gpg \
            wget
          wget -qO- https://apt.kitware.com/keys/kitware-archive-latest.asc \
            | gpg --dearmor -o /usr/share/keyrings/kitware-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/kitware-archive-keyring.gpg] https://apt.kitware.com/ubuntu/ focal main" \
            > /etc/apt/sources.list.d/kitware.list
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            git \
            pkg-config \
            curl \
            ca-certificates \
            flex \
            bison \
            libyaml-dev \
            libssl-dev \
            libnghttp2-dev \
            libc-ares-dev \
            cppcheck \
            autoconf \
            automake \
            libtool \
            protobuf-compiler \
            libprotobuf-dev

      - name: Build static dependencies (ldns + protobuf-c)
        run: ./scripts/build-static-deps.sh /usr/local

      - name: Clone and prepare Fluent Bit ${{ inputs.flb_version }}
        run: |
          git clone --depth 1 --branch ${{ inputs.flb_version }} https://github.com/fluent/fluent-bit.git /tmp/fluent-bit
          cd /tmp/fluent-bit/build
          cmake -DCMAKE_POLICY_VERSION_MINIMUM=3.5 ..

      - name: Build plugin
        run: |
          mkdir -p build
          cd build
          cmake -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DFLB_SOURCE=/tmp/fluent-bit -DPLUGIN_NAME=in_dnstap ../
          make

      - name: Verify no dynamic ldns/protobuf-c dependency
        run: |
          echo "==> Checking shared library dependencies..."
          ldd build/flb-in_dnstap.so
          echo "---"
          if ldd build/flb-in_dnstap.so | grep -qE 'libldns|libprotobuf-c'; then
            echo "ERROR: Plugin still has dynamic dependency on libldns or libprotobuf-c!"
            exit 1
          fi
          echo "OK: No dynamic libldns/libprotobuf-c dependency found."

      - name: Prepare release assets
        if: ${{ inputs.prepare_release }}
        run: |
          FLB_SHORT=$(echo "${{ inputs.flb_version }}" | sed 's/^v//')
          mkdir -p dist
          cp build/flb-in_dnstap.so "dist/flb-in_dnstap-flb${FLB_SHORT}.so"

      - name: Upload release artifacts
        if: ${{ inputs.prepare_release }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_prefix }}-${{ inputs.flb_version }}
          path: dist/
          retention-days: 90

      - name: Upload PR artifacts
        if: ${{ !inputs.prepare_release }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_prefix }}-${{ inputs.flb_version }}
          path: build/flb-in_dnstap.so
          retention-days: 7
