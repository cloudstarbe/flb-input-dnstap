name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  matrix:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.load.outputs.versions }}
    steps:
      - uses: actions/checkout@v4
      - id: load
        run: echo "versions=$(cat .github/flb-versions.json)" >> $GITHUB_OUTPUT

  build:
    needs: matrix
    strategy:
      fail-fast: false
      matrix:
        flb_version: ${{ fromJSON(needs.matrix.outputs.versions) }}
    uses: ./.github/workflows/reusable-build.yml
    with:
      flb_version: ${{ matrix.flb_version }}
      artifact_prefix: release-flb
      prepare_release: true

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: release-flb-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: release-assets/*.so
